<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulso | Registro</title>
  <link rel="icon" href="imagenes/favicon.svg" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">
          <img src="imagenes/favicon.svg" alt="Logo Pulso">
        </a>
      </div>

      <ul class="nav-links nav-left">
        <li><a href="index.html">Home</a></li>

        <li class="dropdown">
          <a href="#">Categorías</a>
          <ul class="dropdown-menu">
            <li><a href="remeras.html">Remeras</a></li>
            <li><a href="buzos.html">Buzos</a></li>
            <li><a href="pantalones.html">Pantalones</a></li>
          </ul>
        </li>
      </ul>

      <ul class="nav-links nav-right">
        <li><a href="login.html">Login</a></li>
        <li><a href="login.html">Logout</a></li>
        <li><a href="registro.html">Registro</a></li>
      </ul>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-card auth-card-register">
      <h1>Crear cuenta</h1>

      <form action="#" method="post" class="auth-form">
        <label for="nombre">Nombre</label>
        <div class="auth-input">
          <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
        </div>

        <label for="apellido">Apellido</label>
        <div class="auth-input">
          <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>
        </div>

        <label for="email">Email</label>
        <div class="auth-input">
          <input type="email" id="email" name="email" placeholder="e-mail address" required>
        </div>

        <label for="password">Contraseña</label>
        <div class="auth-input">
          <input type="password" id="password" name="password" placeholder="password" required>
        </div>

        <label for="fecha">Fecha de nacimiento</label>
        <div class="auth-input">
          <input type="date" id="fecha" name="fecha" required>
        </div>

        <button type="submit" class="auth-submit">→</button>
      </form>

      <div class="auth-footer-link">
        <a href="login.html">¿Ya tenés cuenta? Iniciá sesión</a>
      </div>
    </section>
  </main>

</body>

</html>
